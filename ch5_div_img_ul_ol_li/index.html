<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>div img ol ul li</title>
  </head>
  <body>
    <h1>HTML Elements: div, img, ol, ul, li</h1>
    <div style="border: 1px solid black; padding: 10px; margin-bottom: 20px">
      <img src="girl.png" alt="" height="200px" />
      <p>This girl won the competition.</p>
    </div>
    <h2>Her sisters</h2>
    <ul>
      <li>Mariam</li>
      <li>Huda</li>
      <li>Rania</li>
    </ul>
    <h2>Her hobbies</h2>
    <ol type="1" reversed>
      <li>Reading</li>
      <li>Swimming</li>
      <li>Traveling</li>
      <li>Cooking</li>
    </ol>
  </body>
</html>
