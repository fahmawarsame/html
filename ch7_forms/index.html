<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complete HTML Form Elements</title>
</head>
<body>

<form action="/submit" method="post">

    <!-- Fieldset -->
    <fieldset>
        <legend>Personal Information</legend>

        <!-- Text -->
        <label for="text">Text:</label>
        <input type="text" id="text" name="text"><br><br>

        <!-- Password -->
        <label for="password">Password:</label>
        <input type="password" id="password" name="password"><br><br>

        <!-- Email -->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        <!-- Number -->
        <label for="number">Number:</label>
        <input type="number" id="number" name="number" min="0" max="100"><br><br>

        <!-- Tel -->
        <label for="tel">Telephone:</label>
        <input type="tel" id="tel" name="tel"><br><br>

        <!-- URL -->
        <label for="url">Website:</label>
        <input type="url" id="url" name="url"><br><br>

        <!-- Search -->
        <label for="search">Search:</label>
        <input type="search" id="search" name="search"><br><br>

        <!-- Date -->
        <label for="date">Date:</label>
        <input type="date" id="date" name="date"><br><br>

        <!-- Time -->
        <label for="time">Time:</label>
        <input type="time" id="time" name="time"><br><br>

        <!-- Datetime Local -->
        <label for="datetime">Date & Time:</label>
        <input type="datetime-local" id="datetime" name="datetime"><br><br>

        <!-- Month -->
        <label for="month">Month:</label>
        <input type="month" id="month" name="month"><br><br>

        <!-- Week -->
        <label for="week">Week:</label>
        <input type="week" id="week" name="week"><br><br>

        <!-- Color -->
        <label for="color">Favorite Color:</label>
        <input type="color" id="color" name="color"><br><br>

        <!-- Range -->
        <label for="range">Range:</label>
        <input type="range" id="range" name="range" min="0" max="100"><br><br>

        <!-- Hidden -->
        <input type="hidden" name="hiddenField" value="12345">

        <!-- Checkbox -->
        <p>Checkboxes:</p>
        <input type="checkbox" id="html" name="skills" value="HTML">
        <label for="html">HTML</label>

        <input type="checkbox" id="css" name="skills" value="CSS">
        <label for="css">CSS</label>

        <input type="checkbox" id="js" name="skills" value="JavaScript">
        <label for="js">JavaScript</label>
        <br><br>

        <!-- Radio -->
        <p>Radio Buttons:</p>
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>

        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label>
        <br><br>

        <!-- File -->
        <label for="file">Upload File:</label>
        <input type="file" id="file" name="file"><br><br>

        <!-- Image -->
        <input
            type="image"
            src="https://via.placeholder.com/120x40?text=Submit"
            alt="Submit"
        ><br><br>

    </fieldset>

    <!-- Textarea -->
    <label for="message">Message:</label><br>
    <textarea
        id="message"
        name="message"
        rows="5"
        cols="40"
        placeholder="Type here..."
    ></textarea>
    <br><br>

    <!-- Select -->
    <label for="country">Country:</label>
    <select id="country" name="country">
        <option value="">Choose...</option>
        <option value="uk">United Kingdom</option>
        <option value="us">United States</option>
        <option value="ca">Canada</option>
        <option value="au">Australia</option>
    </select>
    <br><br>

    <!-- Select Multiple -->
    <label for="languages">Languages:</label>
    <select id="languages" name="languages[]" multiple size="4">
        <option>HTML</option>
        <option>CSS</option>
        <option>JavaScript</option>
        <option>Python</option>
    </select>
    <br><br>

    <!-- Optgroup -->
    <label for="cars">Car Brand:</label>
    <select id="cars">
        <optgroup label="German">
            <option>BMW</option>
            <option>Audi</option>
        </optgroup>

        <optgroup label="Japanese">
            <option>Toyota</option>
            <option>Honda</option>
        </optgroup>
    </select>
    <br><br>

    <!-- Datalist -->
    <label for="browser">Browser:</label>
    <input list="browsers" id="browser">
    <datalist id="browsers">
        <option value="Chrome">
        <option value="Firefox">
        <option value="Edge">
        <option value="Safari">
    </datalist>
    <br><br>

    <!-- Progress -->
    <label for="progress">Progress:</label>
    <progress id="progress" value="60" max="100">60%</progress>
    <br><br>

    <!-- Meter -->
    <label for="meter">Disk Usage:</label>
    <meter
        id="meter"
        value="0.7"
        min="0"
        max="1"
        low="0.3"
        high="0.8"
        optimum="0.5">
        70%
    </meter>
    <br><br>

    <!-- Output -->
    <label for="a">Output Example:</label>
    <input type="number" id="a" value="5"
           oninput="result.value=parseInt(a.value)+parseInt(b.value)">
    +
    <input type="number" id="b" value="10"
           oninput="result.value=parseInt(a.value)+parseInt(b.value)">
    =
    <output name="result">15</output>

    <br><br>

    <!-- Buttons -->
    <button type="button">Regular Button</button>
    <button type="submit">Submit</button>
    <button type="reset">Reset</button>

    <br><br>

    <!-- Standard Input Buttons -->
    <input type="submit" value="Input Submit">
    <input type="reset" value="Input Reset">
    <input type="button" value="Input Button">

</form>

</body>
</html>
